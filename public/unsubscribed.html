<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribed — CarRecall</title>
  <link rel="canonical" href="https://www.carrecall.app/unsubscribed.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --orange: #F97316; --bg: #0d0d0d; --bg2: #141414; --border: rgba(255,255,255,0.08); --text: #f0f0f0; --muted: #888; --font: 'DM Sans', sans-serif; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; -webkit-font-smoothing: antialiased; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 3rem 2rem; max-width: 480px; width: 100%; text-align: center; }
    .icon { width: 48px; height: 48px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; font-size: 20px; }
    h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.75rem; }
    p { font-size: 0.9rem; color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem; }
    a.btn { display: inline-block; background: var(--orange); color: #fff; border-radius: 10px; font-family: var(--font); font-size: 0.9rem; font-weight: 600; padding: 0.7rem 1.5rem; text-decoration: none; transition: background 0.2s; }
    a.btn:hover { background: #c45a0e; }
    .footer-note { margin-top: 1.5rem; font-size: 0.78rem; color: #555; }
    .footer-note a { color: #555; text-decoration: none; }
    .footer-note a:hover { color: var(--muted); }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-RN2R9PZGZL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-RN2R9PZGZL');
  </script>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>You've been unsubscribed</h1>
    <p>You'll no longer receive recall alerts for this vehicle. If you change your mind, you can sign up again any time — it only takes 30 seconds.</p>
    <a href="/" class="btn">Sign up again</a>
    <p class="footer-note">
      CarRecall by <a href="https://alphapariah.studio" target="_blank" rel="noopener">Alpha Pariah Studios</a>
    </p>
  </div>
</body>
</html>
